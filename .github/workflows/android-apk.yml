name: Build Android APK

# Triggers:
#   - Manual: Actions tab → "Build Android APK" → "Run workflow"
#   - Tag push: git tag v1.0.0 && git push --tags  → builds a signed release APK
#   - PR/push to main: builds a debug APK (sanity check)
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        options: [debug, release]
        default: debug
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'frontend/**'
      - '.github/workflows/android-apk.yml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Verify Node version (must be >=22 for Capacitor 8)
        run: |
          node --version
          npm --version
          which node
          node -e "if (parseInt(process.versions.node.split('.')[0]) < 22) { console.error('Node too old'); process.exit(1) }"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build web bundle
        working-directory: frontend
        env:
          CI: 'false'
        run: npm run build

      - name: Capacitor sync (copy web → android)
        working-directory: frontend
        run: npx cap sync android

      - name: Decode signing keystore (release builds only)
        if: ${{ inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v') }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing. Cannot build release APK."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > frontend/android/app/athlyticai-release.keystore
          echo "Keystore decoded ($(wc -c < frontend/android/app/athlyticai-release.keystore) bytes)"

      - name: Build debug APK
        if: ${{ inputs.build_type != 'release' && !startsWith(github.ref, 'refs/tags/v') }}
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        if: ${{ inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v') }}
        working-directory: frontend/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        working-directory: frontend/android/app/build/outputs/apk
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          ABS_PATH="$(pwd)/$APK_PATH"
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=$ABS_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "apk_size=$SIZE" >> $GITHUB_OUTPUT
          echo "::notice::Built $APK_PATH ($SIZE)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: athlyticai-${{ github.sha }}
          path: frontend/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/android/app/build/outputs/apk/**/*.apk
          generate_release_notes: true
          name: AthlyticAI ${{ github.ref_name }}
          body: |
            ## AthlyticAI Android App ${{ github.ref_name }}

            **Install:** Download the APK below → open on your Android phone → tap to install.

            *First time installing? You may need to allow "Install from unknown sources" in Settings → Security.*

            APK size: ${{ steps.locate.outputs.apk_size }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
