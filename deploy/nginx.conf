# AthlyticAI Nginx Configuration
# Place in /etc/nginx/sites-available/playsmart
# Symlink to /etc/nginx/sites-enabled/playsmart

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream playsmart_backend {
    server 127.0.0.1:8000;
}

# Redirect HTTP to HTTPS (enable after SSL setup)
# server {
#     listen 80;
#     server_name api.yourdomain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Enable after certbot setup
    server_name api.yourdomain.com;  # CHANGE THIS to your domain

    # ─── SSL (managed by certbot - uncomment after setup) ───
    # ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Upload Size (500MB for video uploads) ───
    client_max_body_size 500M;

    # ─── Timeouts for large uploads ───
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    send_timeout 300;

    # ─── CORS Headers ───
    # Adjust the origin to match your Cloudflare Pages domain
    set $cors_origin "https://yourdomain.pages.dev";

    # ─── API Proxy ───
    location / {
        # Rate limiting
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://playsmart_backend;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ─── Static file serving for uploads ───
    location /uploads/ {
        alias /opt/playsmart/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Health check endpoint (no rate limit) ───
    location /health {
        proxy_pass http://playsmart_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Security Headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Logs ───
    access_log /var/log/nginx/playsmart_access.log;
    error_log /var/log/nginx/playsmart_error.log;
}
