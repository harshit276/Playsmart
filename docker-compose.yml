version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: Playsmart/Dockerfile
    container_name: playsmart-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist uploaded files across container restarts
      - uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  uploads:
