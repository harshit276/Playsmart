<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Formanti — Your AI Sports Coach">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#101510"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#a3e635" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#a3e635"/>

  <text x="80" y="150" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="4" fill="#a3e635">FORMANTI</text>

  <text x="76" y="300" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="800" fill="#ffffff">Your AI Sports Coach</text>

  <text x="80" y="372" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="400" fill="#cfcfcf">Upload a video. Get instant AI technique analysis,</text>
  <text x="80" y="418" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="400" fill="#cfcfcf">training plans &amp; equipment picks.</text>

  <g font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#0a0a0a">
    <rect x="80" y="480" width="180" height="52" rx="26" fill="#a3e635"/>
    <text x="170" y="514" text-anchor="middle">Badminton</text>
    <rect x="276" y="480" width="130" height="52" rx="26" fill="#1c1c1c" stroke="#333"/>
    <text x="341" y="514" text-anchor="middle" fill="#e5e5e5">Tennis</text>
    <rect x="422" y="480" width="190" height="52" rx="26" fill="#1c1c1c" stroke="#333"/>
    <text x="517" y="514" text-anchor="middle" fill="#e5e5e5">Table Tennis</text>
    <rect x="628" y="480" width="150" height="52" rx="26" fill="#1c1c1c" stroke="#333"/>
    <text x="703" y="514" text-anchor="middle" fill="#e5e5e5">Cricket</text>
    <rect x="794" y="480" width="180" height="52" rx="26" fill="#1c1c1c" stroke="#333"/>
    <text x="884" y="514" text-anchor="middle" fill="#e5e5e5">Swimming</text>
  </g>

  <text x="80" y="588" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" fill="#7a7a7a">formanti.com</text>
</svg>
